<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi Ki Doğdun Aynuşum... 🤍</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #fcefe6; color: #4a3728; overflow-x: hidden; }
        
        /* Şifre Ekranı */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; padding: 20px; text-align: center;
        }
        .lock-box {
            background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; width: 100%;
        }
        .lock-box h1 { font-size: 1.8rem; margin-bottom: 15px; color: #d3687c; }
        .lock-box p { font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5; color: #666; }
        .lock-box input {
            width: 100%; padding: 12px 20px; border: 2px solid #e0e0e0; border-radius: 25px;
            margin-bottom: 15px; font-size: 1rem; text-align: center; outline: none;
        }
        .lock-box button {
            background: #d3687c; color: white; border: none; padding: 12px 30px;
            border-radius: 25px; font-size: 1rem; cursor: pointer; width: 100%; font-weight: bold;
        }
        .error-msg { color: #cc0000; font-size: 0.85rem; margin-top: 15px; display: none; font-weight: bold; }

        /* Ana İçerik */
        #main-content { display: none; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        /* Kapak Sayfası Bölümü */
        .cover-section {
            background: white; border-radius: 20px; padding: 20px; text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 30px;
        }
        .cover-photo {
            width: 100%; max-height: 450px; object-fit: cover; border-radius: 15px;
            border: 5px solid #fff0f2; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .cover-title { font-size: 1.8rem; color: #d3687c; margin-top: 20px; font-weight: bold; }
        .cover-subtitle { font-size: 1.1rem; color: #776254; margin-top: 5px; font-style: italic; }

        .timer-section {
            background: white; border-radius: 20px; padding: 30px; text-align: center;
            margin-top: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .timer-section h2 { font-size: 1.4rem; margin-bottom: 15px; color: #b85265; }
        #countdown { font-size: 1.4rem; font-weight: bold; color: #4a3728; letter-spacing: 1px; line-height: 1.6; }

        .story-section { background: white; border-radius: 20px; padding: 40px; margin-top: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .story-section h2 { color: #d3687c; margin-bottom: 20px; border-bottom: 2px solid #fcefe6; padding-bottom: 10px; }
        .story-section p { line-height: 1.8; font-size: 1.05rem; margin-bottom: 20px; }
        
        /* Şehir ve Video Başlıkları */
        .city-title, .video-menu-title { 
            color: #a65261; font-size: 1.3rem; margin-top: 25px; margin-bottom: 15px; 
            display: flex; align-items: center; gap: 8px; font-weight: bold; cursor: pointer;
            background: #fff0f2; padding: 12px; border-radius: 10px; transition: 0.3s;
        }
        .city-title:hover, .video-menu-title:hover { background: #ffdadd; }
        
        .memory-card {
            background: #fff5f0; border-left: 5px solid #d3687c; padding: 25px;
            margin-top: 5px; border-radius: 0 15px 15px 0; margin-bottom: 15px;
        }
        .memory-card p { font-size: 1rem; line-height: 1.7; margin-bottom: 15px; color: #555; font-style: italic; }

        /* Fotoğraf Galerisi Alanı */
        .photo-gallery { 
            display: none; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 12px; 
            margin-top: 20px; 
        }
        .photo-gallery img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 12px; 
            border: 3px solid white; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }

        /* Video Butonları Düzeni */
        .video-gallery {
            display: none;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .video-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.05rem;
            box-shadow: 0 4px 15px rgba(211, 104, 124, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .video-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(211, 104, 124, 0.4);
        }
        .video-btn span { font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-box">
            <h1>En Güzel Hikayemize Hoş Geldin... 🤍</h1>
            <p>Bugün senin günün Aynuşum. Kalbimin sadece senin bildiğin o gizli odasını açmak ve şehirler arası biriktirdiğimiz tüm o güzel anılara yolculuk yapmak için şifreyi girmelisin...</p>
            <input type="text" id="password-input" placeholder="İlk buluşma tarihimiz (GGAAYYYY)">
            <button id="submit-btn">Anılarimizi Aç ✨</button>
            <p id="error-message" class="error-msg">Şifre doğru değil Aynuşum,
