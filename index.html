<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aynuşum'un Dünyası 🤍</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { background: #0f081d; color: white; overflow-x: hidden; }
        
        /* Ekran geçişleri */
        .page { display: none; min-height: 100vh; padding: 20px; text-align: center; position: relative; }
        #home-page { display: block; }

        /* Arka Plan Efektleri */
        .effect-container { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        
        /* Kutucuk Menü Tasarımı */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: 30px auto; }
        .menu-card { 
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;
        }
        .menu-card:hover { transform: scale(1.05); background: rgba(255, 101, 132, 0.2); }

        .back-btn { margin-top: 30px; padding: 10px 20px; background: #ff6584; border-radius: 50px; cursor: pointer; display: inline-block; }
    </style>
</head>
<body>

    <!-- 1. GİRİŞ EKRANI -->
    <div id="lock-screen" style="position:fixed; z-index:100; width:100%; height:100%; background:#0f081d; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <input type="text" id="password" placeholder="Şifre" style="padding:15px; border-radius:30px; border:none; text-align:center;">
        <button onclick="checkPass()" style="margin-top:20px; padding:10px 30px;">Giriş Yap ✨</button>
    </div>

    <!-- 2. ANA MENÜ -->
    <div id="home-page" class="page" style="background: linear-gradient(135deg, #0f081d, #1b0b2e);">
        <h1>Hoş geldin Aynuşum 🤍</h1>
        <div class="menu-grid">
            <div class="menu-card" onclick="showPage('cookie-page')">🍪 Şans Kurabiyesi</div>
            <div class="menu-card" onclick="showPage('quiz-page')">🧐 İlişki Testi</div>
            <div class="menu-card" onclick="showPage('memory-page')">🗺️ Şehir Anıları</div>
            <div class="menu-card" onclick="showPage('video-page')">🎥 Videolarımız</div>
        </div>
    </div>

    <!-- 3. SAYFALAR -->
    <!-- Kurabiye Sayfası -->
    <div id="cookie-page" class="page" style="background: #2d0e2e;">
        <div class="effect-container" id="heart-rain"></div>
        <h2>Şans Kurabiyen 🍪</h2>
        <p id="cookie-text" style="font-size: 1.5rem; margin: 50px 0;">Butona bas ve şansını dene!</p>
        <button onclick="notUret()">Kurabiyeyi Kır</button>
        <div class="back-btn" onclick="showPage('home-page')">Geri Dön</div>
    </div>

    <!-- Test Sayfası -->
    <div id="quiz-page" class="page" style="background: #0e2e2a;">
        <div class="effect-container" id="flower-rain"></div>
        <h2>İlişki Testi 🌸</h2>
        <p>Mehmet en çok neyi sever?</p>
        <div class="menu-card" onclick="alert('Doğru! ❤️')">Seni sevmek</div>
        <div class="menu-card" onclick="alert('Yanlış!')">Excel</div>
        <div class="back-btn" onclick="showPage('home-page')">Geri Dön</div>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById("password").value === "04102025") {
                document.getElementById("lock-screen").style.display = "none";
            }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
            if(pageId === 'cookie-page') startEffect('heart-rain', '❤️');
            if(pageId === 'quiz-page') startEffect('flower-rain', '🌸');
        }

        function startEffect(containerId, emoji) {
            const cont = document.getElementById(containerId);
            setInterval(() => {
                const el = document.createElement('div');
                el.innerHTML = emoji;
                el.style.position = 'absolute';
                el.style.left = Math.random() * 100 + '%';
                el.style.animation = 'fall 5s linear';
                cont.appendChild(el);
                setTimeout(() => el.remove(), 5000);
            }, 800);
        }

        function notUret() {
            const notlar = ["Sen harikasın!", "Bugün çok güzelsin!", "İyi ki doğdun!"];
            document.getElementById("cookie-text").innerText = notlar[Math.floor(Math.random() * notlar.length)];
        }
    </script>
    <style>@keyframes fall { from { top: -10%; } to { top: 110%; } }</style>
</body>
</html>
